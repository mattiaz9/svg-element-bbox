name: CI/CD

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC authentication with npm trusted publishers
  contents: read # Required to read repository contents

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node & npm
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - run: pnpm install

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: "**/dist"
          key: build-artifacts-${{ github.sha }}

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build

    env:
      NODE_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: "**/dist"
          key: build-artifacts-${{ github.sha }}

      - name: Setup node & npm
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Publish to NPM
        run: npm publish . --access=public --no-git-checks

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: publish

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build release notes from commits
        run: bash .github/scripts/build-release-notes.sh "${{ github.ref_name }}"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          generate_release_notes: true
          draft: false
          prerelease: false
